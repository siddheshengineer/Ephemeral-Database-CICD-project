name: Update main Database Schema

on:
  push:
    branches:
      - postgresSQL

jobs:
  migrate:
    name: Migrate DB changes to Production
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: npm install
      
      - name: Run Migrations
        run: npm install && npm run migrate:down && npm run migrate:up
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"